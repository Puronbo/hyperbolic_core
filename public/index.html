<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifold Browser App Viewport</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0b0e14] text-[#c9d1d9] min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-5xl my-6 flex justify-between items-center border-b border-[#262c36] pb-4">
        <div>
            <h1 class="text-2xl font-black text-white tracking-tight">Hyperbolic AI Search Engine</h1>
            <p class="text-xs text-gray-400">Native P2P Browser Gateway Frame Console</p>
        </div>
        <span class="text-xs font-mono bg-green-950 text-green-400 border border-green-800 px-3 py-1 rounded-full">NODE LIVE</span>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-[#151922] border border-[#262c36] rounded-xl p-6 flex flex-col items-center shadow-lg">
            <h3 class="text-sm font-bold text-white mb-4 self-start tracking-wide uppercase">Poincaré Space Geometry Matrix</h3>
            <canvas id="diskCanvas" width="400" height="400" class="bg-[#0d1117] border border-[#262c36] rounded-full"></canvas>
        </div>

        <div class="flex flex-col gap-6">
            <div class="bg-[#151922] border border-[#262c36] rounded-xl p-6 shadow-lg">
                <h3 class="text-sm font-bold text-white mb-4 tracking-wide uppercase border-b border-[#262c36] pb-2">Publish User Creation</h3>
                <div class="flex flex-col gap-3">
                    <input type="text" id="nodeTitle" placeholder="Creation Name / Title..." class="bg-[#0d1117] border border-[#262c36] rounded-lg p-3 text-sm text-white focus:outline-none focus:border-blue-500">
                    <textarea id="nodeContent" placeholder="Paste data payload or article text content here..." class="bg-[#0d1117] border border-[#262c36] rounded-lg p-3 text-sm text-white h-24 resize-none focus:outline-none focus:border-blue-500"></textarea>
                    <button onclick="publishToNetwork()" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold text-sm py-3 rounded-lg cursor-pointer transition-all">Broadcast Creation To Mesh</button>
                </div>
            </div>

            <div class="bg-[#151922] border border-[#262c36] rounded-xl p-6 shadow-lg">
                <h3 class="text-sm font-bold text-white mb-4 tracking-wide uppercase border-b border-[#262c36] pb-2">Query Search Interface</h3>
                <div class="flex gap-2">
                    <input type="text" id="searchBar" placeholder="Search human creations indexed by AI..." class="w-full bg-[#0d1117] border border-[#262c36] rounded-lg p-3 text-sm text-white focus:outline-none focus:border-yellow-500">
                    <button onclick="searchNetwork()" class="bg-yellow-600 hover:bg-yellow-500 text-white font-semibold text-sm px-6 rounded-lg cursor-pointer transition-all">Search</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('diskCanvas');
        const ctx = canvas.getContext('2d');
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const radiusLimit = canvas.width / 2 - 12;
        
        let localPointList = [];

        async function publishToNetwork() {
            const title = document.getElementById('nodeTitle').value.trim();
            const textBody = document.getElementById('nodeContent').value.trim();
            if (!textBody) return alert("Content empty.");

            const response = await fetch('/api/network/publish', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, textBody })
            });
            const result = await response.json();
            
            localPointList.push(result);
            renderDiscManifold();
            
            document.getElementById('nodeTitle').value = '';
            document.getElementById('nodeContent').value = '';
        }

        async function searchNetwork() {
            const searchTokens = document.getElementById('searchBar').value.trim();
            if (!searchTokens) return;

            const response = await fetch('/api/network/search', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ searchTokens })
            });
            const data = await response.json();

            if (data.found) {
                alert(`🎯 Found Item! Title: "${data.record.title}"\nContent: "${data.record.content}"\nCID Address ID: ${data.cid}`);
                renderDiscManifold(data.cid);
            } else {
                alert("❌ No matching coordinates discovered in network branches.");
            }
        }

        function renderDiscManifold(activeCid = null) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Outer manifold boundary lines boundary ring marker
            ctx.beginPath();
            ctx.arc(cx, cy, radiusLimit, 0, 2 * Math.PI);
            ctx.strokeStyle = '#262c36';
            ctx.lineWidth = 2;
            ctx.stroke();

            localPointList.forEach(item => {
                const mapX = cx + (item.data.coordinates.x * radiusLimit);
                const mapY = cy + (item.data.coordinates.y * radiusLimit);
                const isHit = (item.cid === activeCid);

                ctx.beginPath();
                ctx.arc(mapX, mapY, isHit ? 8 : 5, 0, 2 * Math.PI);
                ctx.fillStyle = isHit ? '#f59e0b' : '#3b82f6';
                ctx.fill();
            });
        }
        
        renderDiscManifold();
    </script>
</body>
</html>
