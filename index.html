<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manifold Memory Mesh</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0b0e14; color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        #canvas-wrap { background: #151922; border: 1px solid #262c36; padding: 20px; border-radius: 12px; height: 500px; }
        canvas { width: 100% !important; height: 100% !important; }
        .log { background: #070a0f; height: 150px; overflow-y: auto; padding: 10px; border: 1px solid #262c36; margin-top: 20px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Manifold Index: Persistent Mesh</h1>
        <div id="canvas-wrap"><canvas id="manifoldCanvas"></canvas></div>
        <div id="logs" class="log"></div>
    </div>

    <script>
        let mappedDataPool = JSON.parse(localStorage.getItem('manifold_data')) || [];
        
        const ctx = document.getElementById('manifoldCanvas').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'scatter',
            data: { datasets: [{ label: 'Nodes', data: mappedDataPool, backgroundColor: '#58a6ff' }] },
            options: { scales: { x: { min: -1, max: 1 }, y: { min: -1, max: 1 } } }
        });

        function addNode(x, y, label) {
            const newNode = { x, y, label };
            mappedDataPool.push(newNode);
            localStorage.setItem('manifold_data', JSON.stringify(mappedDataPool));
            chart.data.datasets[0].data = mappedDataPool;
            chart.update();
            const log = document.getElementById('logs');
            log.innerHTML += `<div>Anchored: ${label} at [${x.toFixed(2)}, ${y.toFixed(2)}]</div>`;
        }

        // Auto-generate test data
        setInterval(() => {
            if (mappedDataPool.length < 50) {
                addNode((Math.random()-0.5)*1.5, (Math.random()-0.5)*1.5, "Node_" + Date.now());
            }
        }, 2000);
    </script>
</body>
</html>
