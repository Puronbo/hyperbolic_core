<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manifold Index: Permanent Memory Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #151922;
            --border-color: #262c36;
            --text-main: #c9d1d9;
            --accent-blue: #58a6ff;
            --accent-red: #f85149;
            --accent-green: #7ee787;
            --accent-yellow: #ffea7f;
        }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }

        header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 1100px; }
        h1 { margin: 0; color: #fff; font-size: 2.2rem; letter-spacing: -0.5px; }
        .subtitle { color: #8b949e; margin: 6px 0 0 0; font-size: 1rem; }

        .search-container { width: 100%; max-width: 600px; margin: 0 auto 25px auto; display: flex; gap: 10px; }
        .search-bar {
            flex: 1; background-color: #1c212c; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 14px 18px; color: #fff; font-size: 1rem; outline: none;
        }
        .search-bar:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15); }
        .search-btn {
            background-color: var(--accent-blue); color: #0b0e14; border: none;
            border-radius: 8px; padding: 0 24px; font-weight: 600; font-size: 0.95rem; cursor: pointer;
        }

        .main-layout { display: flex; gap: 24px; max-width: 1100px; width: 100%; justify-content: center; }
        .map-panel {
            background-color: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 14px; padding: 24px; width: 500px; height: 500px;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .sidebar { display: flex; flex-direction: column; gap: 20px; width: 500px; }
        .panel { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; }
        .panel h3 { margin-top: 0; color: #fff; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-size: 1.1rem; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: rgba(255,255,255,0.02); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); }
        .stat-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; }
        .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent-blue); margin-top: 4px; }
        .stat-val.secure { color: var(--accent-green); }

        .log-stream {
            background-color: #070a0f; border: 1px solid var(--border-color); border-radius: 8px;
            height: 240px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; padding: 12px; box-sizing: border-box;
        }
        .log-entry { margin-bottom: 8px; line-height: 1.4; border-left: 3px solid transparent; padding-left: 8px; }
        .log-entry.info { color: #8b949e; border-color: #388bfd; }
        .log-entry.success { color: var(--accent-green); border-color: #2ea043; }
        .log-entry.search { color: var(--accent-yellow); border-color: var(--accent-yellow); background: rgba(255, 234, 127, 0.05); padding: 6px; }

        .clear-btn {
            background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-top: 10px;
            transition: background 0.2s;
        }
        .clear-btn:hover { background: rgba(248, 81, 73, 0.1); }

        canvas { max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<header>
    <h1>Manifold Index</h1>
    <p class="subtitle">Decentralized Geometric Text Engine with IndexedDB Local Storage Vault</p>
</header>

<div class="search-container">
    <input type="text" id="queryInput" class="search-bar" placeholder="Search the database vault instantly...">
    <button class="search-btn" onclick="executeTrueSearch()">Search</button>
</div>

<div class="main-layout">
    <div class="map-panel">
        <canvas id="poincareCanvas" width="480" height="480"></canvas>
    </div>

    <div class="sidebar">
        <div class="panel">
            <h3>Engine Vault Index</h3>
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-label">Unique Terms Tokenized</div>
                    <div class="stat-val" id="term-count">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Documents Indexed</div>
                    <div class="stat-val secure" id="doc-count">0</div>
                </div>
            </div>
            <button class="clear-btn" onclick="clearLocalVault()">Wipe Local Vault Memory</button>
        </div>

        <div class="panel">
            <h3>Engine Vector Telemetry</h3>
            <div class="log-stream" id="console-logs">
                <div class="log-entry info">[SYSTEM INITIALIZED]: Loading permanent disk space layers...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // System Setup Matrices
    let documents = []; 
    let vocabulary = new Set();
    let docTermCounts = []; 
    let dfMap = {}; 
    let db = null;

    // Poincare disk geometry equations
    function hyperbolicDistance(u_x, u_y, v_x, v_y) {
        const sq_norm_u = u_x*u_x + u_y*u_y;
        const sq_norm_v = v_x*v_x + v_y*v_y;
        const sq_dist = (u_x - v_x)**2 + (u_y - v_y)**2;
        const denom = Math.max((1.0 - sq_norm_u) * (1.0 - sq_norm_v), 1e-12);
        return Math.acosh(1.0 + 2.0 * sq_dist / denom);
    }

    function tokenize(text) {
        return text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 2);
    }

    // --- INDEXEDDB PERMANENT LOCAL STORAGE SUITE ---
    const dbRequest = indexedDB.open("ManifoldSearchVault", 1);

    dbRequest.onupgradeneeded = function(event) {
        let database = event.target.result;
        if (!database.objectStoreNames.contains("documents")) {
            database.createObjectStore("documents", { keyPath: "id", autoIncrement: true });
        }
    };

    dbRequest.onsuccess = function(event) {
        db = event.target.result;
        appendConsoleLog("[VAULT STATUS]: Permanent storage engine active. Hydrating memory records...", "success");
        loadStoredVaultDocuments();
    };

    dbRequest.onerror = function() {
        appendConsoleLog("[VAULT ERROR]: Browser disk architecture access denied.", "warn");
    };

    // Load everything out of storage when the page wakes up
    function loadStoredVaultDocuments() {
        const transaction = db.transaction(["documents"], "readonly");
        const store = transaction.objectStore(["documents"]);
        const request = store.getAll();

        request.onsuccess = function() {
            const records = request.result;
            if (records.length > 0) {
                appendConsoleLog(`📦 [VAULT RESTORATION]: Loaded ${records.length} documents natively from disk cache!`, "success");
                records.forEach(doc => {
                    hydrateDocumentIntoMemory(doc.text, doc.x, doc.y);
                });
                poincareChart.update();
            } else {
                appendConsoleLog("💡 [VAULT EMPTY]: Fresh node sequence detected. Commencing organic link discovery crawl...", "info");
                runCrawlSequenceLoop();
            }
        };
    }

    // Save a brand new document to the permanent user storage vault
    function saveDocumentToVaultDisk(text, x, y) {
        if (!db) return;
        const transaction = db.transaction(["documents"], "readwrite");
        const store = transaction.objectStore(["documents"]);
        store.add({ text: text, x: x, y: y });
    }

    function clearLocalVault() {
        if (!db) return;
        const transaction = db.transaction(["documents"], "readwrite");
        const store = transaction.objectStore(["documents"]);
        const request = store.clear();
        request.onsuccess = function() {
            alert("Database local memory completely wiped. Refresh the page to restart fresh.");
            window.location.reload();
        };
    }

    // --- TEXT VECTOR RECONSTRUCTION OPERATIONS ---
    function hydrateDocumentIntoMemory(text, cachedX, cachedY) {
        const words = tokenize(text);
        if (words.length === 0) return;

        const counts = {};
        const uniqueInDoc = new Set();

        words.forEach(w => {
            counts[w] = (counts[w] || 0) + 1;
            vocabulary.add(w);
            uniqueInDoc.add(w);
        });

        uniqueInDoc.forEach(w => { dfMap[w] = (dfMap[w] || 0) + 1; });
        docTermCounts.push(counts);

        const nodeObj = { text: text, x: cachedX, y: cachedY, label: text.substring(0, 42) + "..." };
        documents.push(nodeObj);
        poincareChart.data.datasets[1].data.push(nodeObj);

        document.getElementById("term-count").innerText = vocabulary.size;
        document.getElementById("doc-count").innerText = documents.length;
    }

    function processAndIndexNewDocument(text) {
        // Generate new geometric coordinates
        const hash = text.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
        const radius = 0.3 + (hash % 40) / 100;
        const angle = (hash % 360) * (Math.PI / 180);
        const x = radius * Math.cos(angle);
        const y = radius * Math.sin(angle);

        // Commit to running dynamic memory arrays
        hydrateDocumentIntoMemory(text, x, y);
        // Commit to permanent physical disk space storage
        saveDocumentToVaultDisk(text, x, y);
        
        poincareChart.update();
    }

    // --- ENGINE VECTOR RETRIEVAL SEARCH EXECUTION ---
    function executeTrueSearch() {
        const queryText = document.getElementById("queryInput").value.trim();
        if (!queryText) return;

        appendConsoleLog(`🔍 [QUERY EXECUTION]: Running vector dot product evaluation...`, "search");
        const queryWords = tokenize(queryText);
        const queryVector = {};
        
        queryWords.forEach(w => { if (vocabulary.has(w)) queryVector[w] = (queryVector[w] || 0) + 1; });

        if (Object.keys(queryVector).length === 0) {
            appendConsoleLog(`   ↳ ❌ Absolute zero keyword match density found for query inputs.`, "warn");
            return;
        }

        let bestDoc = null;
        let highestScore = -1;
        poincareChart.data.datasets[2].data = [];

        documents.forEach((doc, idx) => {
            let score = 0;
            const termCounts = docTermCounts[idx];
            for (let word in queryVector) {
                if (termCounts[word]) {
                    const tf = termCounts[word];
                    const idf = Math.log(documents.length / (dfMap[word] || 1)) + 1;
                    score += tf * idf;
                }
            }
            if (score > highestScore) { highestScore = score; bestDoc = doc; }
        });

        if (bestDoc && highestScore > 0) {
            appendConsoleLog(`   ↳ 🎯 MATCH DETECTED! Mathematical Relevance Score: ${highestScore.toFixed(3)}`, "success");
            appendConsoleLog(`   ↳ [MATCH]: "${bestDoc.text}"`, "success");
            poincareChart.data.datasets[2].data.push({ x: bestDoc.x, y: bestDoc.y, label: "ACTIVE QUERY MATCH" });
        } else {
            appendConsoleLog(`   ↳ ❌ Vector proximity alignment values fell below search retrieval floor.`, "warn");
        }
        poincareChart.update();
    }

    function appendConsoleLog(text, cssClass) {
        let logWindow = document.getElementById("console-logs");
        let el = document.createElement("div"); el.className = `log-entry ${cssClass}`;
        el.innerText = text; logWindow.appendChild(el); logWindow.scrollTop = logWindow.scrollHeight;
    }

    // Graphics Chart Mapping Setup configurations
    const ctx = document.getElementById('poincareCanvas').getContext('2d');
    const poincareChart = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [
                { label: 'Origin Base Axis', data: [{x:0, y:0, label: "CORE MASTER VECTOR REPOSITORY"}], backgroundColor: '#ffea7f', pointRadius: 8 },
                { label: 'Vault Document Coordinates', data: [], backgroundColor: '#58a6ff', pointRadius: 6 },
                { label: 'Active Matching Target Vector', data: [], backgroundColor: '#7ee787', pointRadius: 12, borderWidth: 2, borderColor: '#fff' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => ctx.raw.label } } },
            scales: {
                x: { min: -1.05, max: 1.05, grid: { color: '#1b202a' }, ticks: { display: false } },
                y: { min: -1.05, max: 1.05, grid: { color: '#1b202a' }, ticks: { display: false } }
            }
        }
    });

    // Autonomous Background Data Ingestion Pipeline Seed Corpus
    const targetNetworkCorpus = [
        "Ancient oral folklore and traditional myths passed down through native community storytelling generations.",
        "Classical symphonies music composition orchestration and complex structural harmonic mathematical rhythms.",
        "Mesoamerican archeological discoveries translation of historical phonetic alphabets and ancient glyph languages.",
        "Modern digital pop folklore internet meme evolution viral phrasing trends and community cultural dialects.",
        "Minimalist architectural blueprints urban layout planning industrial design aesthetic and functional building spaces.",
        "Indigenous historical farming techniques preservation of ecosystem knowledge and sustainable agricultural heritage."
    ];

    let crawlIndex = 0;
    function runCrawlSequenceLoop() {
        if (crawlIndex < targetNetworkCorpus.length) {
            appendConsoleLog(`📡 [CRAWLER ACTIVE]: Committing new crawled link text data maps to IndexedDB...`, "info");
            processAndIndexNewDocument(targetNetworkCorpus[crawlIndex]);
            crawlIndex++;
            setTimeout(runCrawlSequenceLoop, 2500);
        }
    }
</script>

</body>
</html>
